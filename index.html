<!-- displacement filter used by the home glass logo (backdrop-filter: url(#glassDisp)) -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
<filter id="glassDisp" x="-20%" y="-20%" width="140%" height="140%">
<feTurbulence type="fractalNoise" baseFrequency="0.010 0.016" numOctaves="2" seed="11" result="noise"></feTurbulence>
<feDisplacementMap in="SourceGraphic" in2="noise" scale="26" xChannelSelector="R" yChannelSelector="G"></feDisplacementMap>
</filter>
</svg>
<div id="root"></div>
